<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Items Dashboard</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0b1020;
      --panel: #121933;
      --panel-2: #1a2347;
      --text: #e8ecff;
      --muted: #aab4df;
      --border: #2a3568;
      --accent: #7aa2ff;
      --accent-2: #9cafff;
      --danger: #ff7a7a;
      --success: #7dffb3;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(122, 162, 255, 0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(156, 175, 255, 0.12), transparent 25%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 20px 80px;
    }

    .header {
      margin-bottom: 24px;
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent-2);
      margin-bottom: 8px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.05;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      max-width: 640px;
    }

    .grid {
      display: grid;
      gap: 20px;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-body {
      padding: 20px;
    }

    form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      outline: none;
      font-size: 16px;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(122, 162, 255, 0.18);
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.2s ease;
    }

    button:hover { opacity: 0.96; }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .primary {
      background: var(--accent);
      color: #081022;
      min-width: 120px;
    }

    .ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .danger {
      background: rgba(255, 122, 122, 0.12);
      color: #ffd8d8;
      border: 1px solid rgba(255, 122, 122, 0.35);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .toolbar h2 {
      margin: 0;
      font-size: 20px;
    }

    .status {
      min-height: 24px;
      margin-top: 12px;
      font-size: 14px;
      color: var(--muted);
    }

    .status.error { color: #ffd1d1; }
    .status.success { color: var(--success); }

    .list {
      display: grid;
      gap: 12px;
    }

    .item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: start;
      padding: 16px;
      border-radius: 14px;
      background: var(--panel);
      border: 1px solid var(--border);
    }

    .item-text {
      margin: 0 0 6px;
      font-size: 16px;
      line-height: 1.4;
      word-break: break-word;
    }

    .item-meta {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
    }

    .empty {
      padding: 24px;
      text-align: center;
      border: 1px dashed var(--border);
      border-radius: 14px;
      color: var(--muted);
      background: rgba(255,255,255,0.02);
    }

    .footer-note {
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
    }

    .loading {
      opacity: 0.75;
    }

    @media (max-width: 640px) {
      form {
        grid-template-columns: 1fr;
      }

      .item {
        grid-template-columns: 1fr;
      }

      .item-actions {
        display: flex;
        justify-content: flex-end;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="header">
      <div class="eyebrow">Express + SQLite</div>
      <h1>Items Dashboard</h1>
      <p class="sub">
        Simple front end for creating, listing, and deleting items from your local API.
      </p>
    </section>

    <section class="grid">
      <div class="card">
        <div class="card-body">
          <form id="item-form">
            <input
              id="item-input"
              name="text"
              type="text"
              placeholder="Enter a new item..."
              maxlength="280"
              autocomplete="off"
              required
            />
            <button id="submit-btn" class="primary" type="submit">Add Item</button>
          </form>
          <div id="form-status" class="status" aria-live="polite"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-body">
          <div class="toolbar">
            <h2>Saved Items</h2>
            <button id="refresh-btn" class="ghost" type="button">Refresh</button>
          </div>

          <div id="list" class="list loading" aria-live="polite"></div>
          <p class="footer-note">
            Expected API routes: <code>GET /api/items</code>, <code>POST /api/items</code>, <code>DELETE /api/items/:id</code>
          </p>
        </div>
      </div>
    </section>
  </main>

  <script>
    const listEl = document.getElementById("list");
    const formEl = document.getElementById("item-form");
    const inputEl = document.getElementById("item-input");
    const submitBtn = document.getElementById("submit-btn");
    const refreshBtn = document.getElementById("refresh-btn");
    const formStatusEl = document.getElementById("form-status");

    function setFormStatus(message, type = "") {
      formStatusEl.textContent = message;
      formStatusEl.className = `status ${type}`.trim();
    }

    function formatDate(value) {
      if (!value) return "No timestamp";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return value;
      return d.toLocaleString();
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function fetchItems() {
      listEl.classList.add("loading");
      listEl.innerHTML = `<div class="empty">Loading items...</div>`;

      try {
        const res = await fetch("/api/items");
        if (!res.ok) {
          throw new Error(`GET /api/items failed with ${res.status}`);
        }

        const items = await res.json();

        if (!Array.isArray(items) || items.length === 0) {
          listEl.innerHTML = `<div class="empty">No items yet. Add the first one above.</div>`;
          return;
        }

        listEl.innerHTML = items
          .slice()
          .sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0))
          .map((item) => {
            const text = escapeHtml(item.text ?? "");
            const createdAt = escapeHtml(formatDate(item.createdAt));
            const id = encodeURIComponent(item.id);

            return `
              <article class="item">
                <div>
                  <p class="item-text">${text || "(empty item)"}</p>
                  <p class="item-meta">ID: ${escapeHtml(String(item.id))} • Created: ${createdAt}</p>
                </div>
                <div class="item-actions">
                  <button class="danger" type="button" data-delete-id="${id}">Delete</button>
                </div>
              </article>
            `;
          })
          .join("");
      } catch (err) {
        console.error(err);
        listEl.innerHTML = `
          <div class="empty">
            Could not load items.<br />
            <small>${escapeHtml(err.message)}</small>
          </div>
        `;
      } finally {
        listEl.classList.remove("loading");
      }
    }

    async function createItem(text) {
      const payload = {
        text,
        createdAt: new Date().toISOString()
      };

      const res = await fetch("/api/items", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      if (!res.ok) {
        const body = await res.text().catch(() => "");
        throw new Error(`POST /api/items failed with ${res.status}${body ? `: ${body}` : ""}`);
      }

      return res.json().catch(() => payload);
    }

    async function deleteItem(id) {
      const res = await fetch(`/api/items/${encodeURIComponent(id)}`, {
        method: "DELETE"
      });

      if (!res.ok) {
        const body = await res.text().catch(() => "");
        throw new Error(`DELETE /api/items/${id} failed with ${res.status}${body ? `: ${body}` : ""}`);
      }
    }

    formEl.addEventListener("submit", async (event) => {
      event.preventDefault();

      const text = inputEl.value.trim();
      if (!text) {
        setFormStatus("Enter some text before submitting.", "error");
        inputEl.focus();
        return;
      }

      submitBtn.disabled = true;
      setFormStatus("Saving item...");

      try {
        await createItem(text);
        inputEl.value = "";
        setFormStatus("Item added.", "success");
        await fetchItems();
        inputEl.focus();
      } catch (err) {
        console.error(err);
        setFormStatus(err.message, "error");
      } finally {
        submitBtn.disabled = false;
      }
    });

    refreshBtn.addEventListener("click", fetchItems);

    listEl.addEventListener("click", async (event) => {
      const button = event.target.closest("[data-delete-id]");
      if (!button) return;

      const id = button.getAttribute("data-delete-id");
      if (!id) return;

      button.disabled = true;
      setFormStatus("Deleting item...");

      try {
        await deleteItem(id);
        setFormStatus("Item deleted.", "success");
        await fetchItems();
      } catch (err) {
        console.error(err);
        setFormStatus(err.message, "error");
        button.disabled = false;
      }
    });

    fetchItems();
  </script>
</body>
</html>
