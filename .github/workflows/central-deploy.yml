name: Central Deploy Workflow

on:
  workflow_call:
    inputs:
      project-name:
        required: true
        type: string
      environment:
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          repository: my-org/${{ inputs.project-name }}
          path: ${{ inputs.project-name }}

      - name: Run FixCord Diagnostics
        run: |
          cd ${{ inputs.project-name }}
          npx tsx ../fixcord.ts . --json
          if [ $? -ne 0 ]; then exit 1; fi

      - name: Build
        run: |
          cd ${{ inputs.project-name }}
          npm ci
          npm run build

      - name: Deploy
        run: |
          cd ${{ inputs.project-name }}
          echo "Deploying ${{ inputs.project-name }} to ${{ inputs.environment }}"
