name: Build and Push Docker Image
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build the Docker image
        run: docker build . --file Dockerfile --tag ogenbuild:latest
      - name: Run smoke test
        run: docker run --rm ogenbuild:latest python -c "import src.app; print('OK')"
