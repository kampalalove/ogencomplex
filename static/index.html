<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGENbuild · Sustainable AI</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; background: #0a0a0f; color: #e0e0e0; }
        h1 { color: #7c9eff; }
        .card { background: #1a1a24; padding: 20px; border-radius: 12px; margin: 20px 0; border: 1px solid #333; }
        button { background: #7c9eff; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        pre { background: #0f0f17; padding: 15px; border-radius: 8px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🌋 OGENbuild</h1>
    <p>The bridge that survives the volcano — proof that AI can be sustainable, sovereign, and defensible.</p>
    
    <div class="card">
        <h3>🧪 Test the Engine</h3>
        <button onclick="testAPI()">Run TandemMeal() Test</button>
        <pre id="output">Click the button to see the framework in action...</pre>
    </div>

    <div class="card">
        <h3>📜 Audit Log (Encrypted)</h3>
        <button onclick="fetchAudit()">Fetch Last Logs</button>
        <pre id="audit-output">No logs yet.</pre>
    </div>

    <script>
        async function testAPI() {
            const output = document.getElementById('output');
            output.textContent = 'Processing...';
            try {
                const res = await fetch('/api/process', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task: { action: 'deploy_model' }, context: { region: 'EU' } })
                });
                const data = await res.json();
                output.textContent = JSON.stringify(data, null, 2);
            } catch (e) {
                output.textContent = 'Error: ' + e.message;
            }
        }

        async function fetchAudit() {
            const output = document.getElementById('audit-output');
            try {
                const res = await fetch('/api/audit');
                const data = await res.json();
                output.textContent = JSON.stringify(data.logs, null, 2);
            } catch (e) {
                output.textContent = 'Error: ' + e.message;
            }
        }
    </script>
</body>
</html>
