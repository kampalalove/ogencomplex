app = "ogencomplex"
primary_region = "iad"
[build]
  builder = "paketobuildpacks/builder:base"
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
[env]
  NODE_ENV = "production"
[services]
  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20
  [services.ports]
    handlers = ["http"]
    port = 80
    [services.ports.tls_options]
      alpn = ["h2", "http/1.1"]
